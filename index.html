<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MIM 製程品質管理介面</title>
<style>
  :root{
    --main:#1d4e89; --main-d:#163c69; --bg:#f3f5f8; --card:#ffffff;
    --line:#dde3ea; --text:#222; --muted:#667085; --ok:#1f9d55; --warn:#d9822b; --bad:#d64545;
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:"Microsoft JhengHei","PingFang TC",Segoe UI,Arial,sans-serif;background:var(--bg);color:var(--text);}
  header{background:linear-gradient(135deg,var(--main),var(--main-d));color:#fff;padding:18px 24px;}
  header h1{margin:0;font-size:22px;}
  header p{margin:4px 0 0;font-size:13px;opacity:.85;}
  .tabs{display:flex;flex-wrap:wrap;gap:6px;background:var(--main-d);padding:8px 16px;position:sticky;top:0;z-index:10;}
  .tab-btn{background:rgba(255,255,255,.12);border:none;color:#fff;padding:9px 14px;border-radius:6px 6px 0 0;cursor:pointer;font-size:13px;white-space:nowrap;}
  .tab-btn.active{background:var(--bg);color:var(--main-d);font-weight:bold;}
  main{padding:18px;max-width:1200px;margin:0 auto;}
  .panel{display:none;}
  .panel.active{display:block;animation:fade .15s ease;}
  @keyframes fade{from{opacity:0}to{opacity:1}}
  .card{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:18px;margin-bottom:16px;box-shadow:0 1px 2px rgba(0,0,0,.04);}
  .card h2{margin:0 0 4px;font-size:17px;color:var(--main-d);}
  .card .sub{color:var(--muted);font-size:12px;margin-bottom:14px;}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:12px;}
  label{display:block;font-size:12px;color:var(--muted);margin-bottom:4px;}
  input,select,textarea{width:100%;padding:7px 8px;border:1px solid var(--line);border-radius:6px;font-size:13px;background:#fff;}
  textarea{resize:vertical;min-height:50px;grid-column:1/-1;}
  .full{grid-column:1/-1;}
  .actions{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap;}
  button{cursor:pointer;border:none;border-radius:6px;padding:8px 16px;font-size:13px;font-weight:600;}
  .btn-primary{background:var(--main);color:#fff;}
  .btn-primary:hover{background:var(--main-d);}
  .btn-ghost{background:#eef1f5;color:var(--main-d);}
  .btn-ghost:hover{background:#e1e6ec;}
  .btn-danger{background:#fdecec;color:var(--bad);}
  .btn-danger:hover{background:#fbd9d9;}
  table{width:100%;border-collapse:collapse;font-size:12.5px;}
  th,td{border:1px solid var(--line);padding:6px 8px;text-align:left;white-space:nowrap;}
  th{background:#eef1f5;color:var(--main-d);position:sticky;top:0;}
  tbody tr:hover{background:#f8fafc;}
  .table-wrap{overflow:auto;max-height:420px;border:1px solid var(--line);border-radius:8px;}
  .badge{padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600;}
  .badge.ok{background:#e6f6ec;color:var(--ok);}
  .badge.bad{background:#fdecec;color:var(--bad);}
  .toprow{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;margin-bottom:10px;}
  .count{font-size:12px;color:var(--muted);}
  .toast{position:fixed;bottom:20px;right:20px;background:#222;color:#fff;padding:10px 18px;border-radius:8px;font-size:13px;opacity:0;transition:opacity .3s;z-index:99;}
  .toast.show{opacity:1;}
  .small{font-size:11px;color:var(--muted);}
  .del-btn{background:none;border:none;color:var(--bad);cursor:pointer;font-size:13px;}
  .global-bar{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end;padding:0 16px 10px;}
  input[type=file]{padding:4px;}

/* 儀器保養專屬樣式 */
.inst-login-wrap{max-width:420px;margin:30px auto;text-align:center;}
.inst-icon{width:64px;height:64px;border-radius:50%;background:var(--main);color:#fff;display:flex;align-items:center;justify-content:center;font-size:26px;margin:0 auto 12px;}
.inst-recent{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-top:10px;}
.inst-recent button{background:#eef1f5;color:var(--main-d);font-weight:500;font-size:12.5px;padding:8px 12px;}
.inst-userbar{display:flex;justify-content:space-between;align-items:center;background:#fff;border:1px solid var(--line);border-radius:8px;padding:10px 14px;margin-bottom:14px;}
.inst-avatar{width:30px;height:30px;border-radius:50%;background:var(--main);color:#fff;display:inline-flex;align-items:center;justify-content:center;font-size:13px;margin-right:8px;}
.inst-search{width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:8px;margin-bottom:14px;font-size:13px;}
.inst-cat-title{font-size:14px;color:var(--main-d);font-weight:bold;margin:18px 0 8px;display:flex;align-items:center;gap:6px;}
.inst-cat-count{background:var(--main);color:#fff;border-radius:10px;font-size:11px;padding:1px 8px;}
.inst-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px;}
.inst-card{background:#fff;border:1px solid var(--line);border-radius:10px;padding:16px;cursor:pointer;transition:box-shadow .15s;}
.inst-card:hover{box-shadow:0 3px 10px rgba(0,0,0,.08);border-color:var(--main);}
.inst-card .ic{font-size:20px;margin-bottom:6px;}
.inst-card h3{margin:0 0 6px;font-size:14.5px;color:var(--main-d);}
.inst-card .meta{font-size:11.5px;color:var(--muted);line-height:1.6;}
.inst-card .go{font-size:12px;color:var(--main);margin-top:8px;font-weight:600;}
.inst-back{background:none;color:var(--main-d);font-weight:600;padding:6px 0;margin-bottom:10px;}
.inst-detail-head{background:var(--main-d);color:#fff;border-radius:10px;padding:14px 18px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;}
.inst-detail-head h2{margin:0;font-size:16px;}
.inst-detail-head .sub{font-size:12px;opacity:.85;}
.month-tabs{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:14px;}
.month-tab{background:#eef1f5;color:var(--main-d);padding:7px 12px;border-radius:6px;font-size:12.5px;position:relative;}
.month-tab.active{background:var(--main);color:#fff;font-weight:bold;}
.month-tab .dot{position:absolute;top:3px;right:5px;width:6px;height:6px;border-radius:50%;background:var(--ok);}
.inst-info-row{display:flex;gap:20px;flex-wrap:wrap;font-size:13px;margin-bottom:14px;color:var(--text);}
.inst-info-row b{color:var(--main-d);}
.checklist-table{width:100%;border-collapse:collapse;font-size:13px;}
.checklist-table th,.checklist-table td{border:1px solid var(--line);padding:8px;}
.checklist-table th{background:#eef1f5;color:var(--main-d);}
.ok-ng{display:flex;gap:14px;}
.ok-ng label{display:flex;align-items:center;gap:4px;font-size:13px;color:var(--text);margin:0;cursor:pointer;}
.ok-ng input[type=radio]{width:auto;}
.confirm-chip{background:#e6f6ec;color:var(--ok);border:none;border-radius:12px;padding:4px 10px;font-size:11.5px;cursor:pointer;}
.confirm-chip.unconfirmed{background:#f1f3f5;color:var(--muted);}

/* 檢具保養專屬樣式 */
.gauge-subtabs{display:flex;gap:6px;margin-bottom:14px;}
.gauge-subtab{background:#eef1f5;color:var(--main-d);padding:8px 16px;border-radius:6px;font-size:13px;}
.gauge-subtab.active{background:var(--main-d);color:#fff;font-weight:bold;}
.gauge-form-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px;}
.gauge-filter-row{display:flex;gap:8px;flex-wrap:wrap;margin:12px 0;align-items:center;}
.gauge-filter-row input,.gauge-filter-row select{flex:1;min-width:140px;}
.status-pill{padding:3px 10px;border-radius:10px;font-size:11.5px;font-weight:600;}
.status-pill.s-在庫{background:#e6f6ec;color:var(--ok);}
.status-pill.s-借出{background:#fff4e0;color:var(--warn);}
.status-pill.s-送校{background:#e8edfb;color:#3b5bdb;}
.cal-pill{padding:2px 8px;border-radius:10px;font-size:11px;background:#eef1f5;color:var(--main-d);}
.gauge-edit-btn{background:var(--warn);color:#fff;border:none;border-radius:5px;padding:4px 10px;font-size:11.5px;margin-right:4px;}
.gauge-del-btn{background:var(--bad);color:#fff;border:none;border-radius:5px;padding:4px 10px;font-size:11.5px;}
.gauge-summary{font-size:12px;color:var(--muted);margin-bottom:8px;}

/* IQC專屬樣式 */
.iqc-check-row{display:flex;gap:8px;flex-wrap:wrap;margin:10px 0;}
.iqc-check-toggle{flex:1;min-width:90px;padding:9px;border:1.5px solid var(--line);border-radius:6px;text-align:center;cursor:pointer;font-size:12.5px;font-weight:700;color:var(--muted);background:#fff;transition:all .12s ease;}
.iqc-check-toggle.active{background:#e6f6ec;border-color:var(--ok);color:var(--ok);}
.iqc-verdict-row{display:flex;gap:0;margin:10px 0;border:1.5px solid var(--line);border-radius:6px;overflow:hidden;max-width:240px;}
.iqc-verdict-btn{flex:1;padding:10px;text-align:center;cursor:pointer;font-weight:700;font-size:13px;background:#fff;color:var(--muted);border:none;font-family:inherit;}
.iqc-verdict-btn.sel-ok{background:var(--ok);color:#fff;}
.iqc-verdict-btn.sel-ng{background:var(--bad);color:#fff;}
.iqc-verdict-btn.sel-sp{background:var(--warn);color:#fff;}
.iqc-dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--ok);}
.iqc-dash{color:#C9CFD3;}
.iqc-verdict-pill{padding:3px 10px;border-radius:14px;font-weight:700;font-size:11.5px;}
.iqc-verdict-pill.ok{background:#e6f6ec;color:var(--ok);}
.iqc-verdict-pill.ng{background:var(--bad);color:#fff;}
.iqc-verdict-pill.sp{background:#fff3cd;color:#856404;}
tr.ng-row{background:#fdecec;}
.vi{display:block;font-size:10.5px;font-weight:400;color:var(--muted);font-style:italic;}
th .vi{color:#cbd5e1;}

/* 儀表板專屬樣式 */
.dash-login-wrap{max-width:380px;margin:40px auto;text-align:center;}
.dash-stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:14px;margin-bottom:20px;}
.dash-stat-card{background:#fff;border:1px solid var(--line);border-radius:12px;padding:18px 20px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 1px 3px rgba(0,0,0,.04);}
.dash-stat-card .label{font-size:12px;color:var(--muted);margin-bottom:6px;}
.dash-stat-card .value{font-size:26px;font-weight:800;}
.dash-stat-card .icon{width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
.dash-stat-card.blue .icon{background:#e8edfb;color:#3b5bdb;}
.dash-stat-card.green .icon{background:#e6f6ec;color:var(--ok);}
.dash-stat-card.orange .icon{background:#fff4e0;color:var(--warn);}
.dash-stat-card.red .icon{background:#fdecec;color:var(--bad);}
.dash-section-title{font-size:15px;font-weight:700;color:var(--main-d);margin:22px 0 10px;display:flex;align-items:center;gap:8px;}
.dash-period-tabs{display:flex;gap:6px;margin-bottom:16px;}
.dash-period-tab{background:#eef1f5;color:var(--main-d);padding:7px 16px;border-radius:6px;font-size:13px;}
.dash-period-tab.active{background:var(--main-d);color:#fff;font-weight:bold;}
.dash-module-table{width:100%;border-collapse:collapse;font-size:13px;}
.dash-module-table th{background:#eef1f5;color:var(--main-d);padding:8px;text-align:left;}
.dash-module-table td{padding:8px;border-bottom:1px solid var(--line);}
.dash-rate-bar{height:6px;border-radius:3px;background:#eef1f5;overflow:hidden;width:80px;display:inline-block;vertical-align:middle;margin-right:6px;}
.dash-rate-fill{height:100%;background:var(--ok);}
.dash-locked-note{background:#fff4e0;color:var(--warn);font-size:12px;padding:8px 12px;border-radius:8px;margin-bottom:14px;}
</style>
</head>

<script>
// === 臨時除錯小工具:手機沒有 Console 可看,出錯時直接顯示在畫面最上方 ===
(function(){
  const box = document.createElement('div');
  box.id = '__debugBox';
  box.style.cssText = 'display:none;position:fixed;top:0;left:0;right:0;z-index:99999;background:#c0392b;color:#fff;padding:10px 14px;font-size:12px;font-family:monospace;white-space:pre-wrap;max-height:50vh;overflow:auto;box-shadow:0 2px 8px rgba(0,0,0,.4);';
  document.addEventListener('DOMContentLoaded', ()=>document.body.appendChild(box));
  if(document.body) document.body.appendChild(box); else window.addEventListener('load', ()=>document.body.appendChild(box));
  function show(text){
    box.style.display = 'block';
    box.textContent += text + '\n\n';
  }
  window.addEventListener('error', function(e){
    show('JS錯誤: ' + e.message + '\n位置: ' + (e.filename||'') + ':' + e.lineno + ':' + e.colno);
  });
  window.addEventListener('unhandledrejection', function(e){
    show('Promise錯誤: ' + (e.reason && e.reason.message ? e.reason.message : e.reason));
  });
})();
</script>

function buildPanelHTML(mod){
  const fieldsHTML = mod.fields.map(f=>{
    let inputHTML;
    if(f.t==='select'){
      inputHTML = `<select id="f_${mod.key}_${f.k}">${f.opt.map(o=>`<option value="${o}">${o}</option>`).join('')}</select>`;
    } else if(f.t==='textarea'){
      inputHTML = `<textarea id="f_${mod.key}_${f.k}"></textarea>`;
    } else {
      inputHTML = `<input type="${f.t}" id="f_${mod.key}_${f.k}">`;
    }
    const wrapClass = f.t==='textarea' ? 'full' : '';
    return `<div class="${wrapClass}"><label>${f.l}</label>${inputHTML}</div>`;
  }).join('');

  return `
    <div class="card">
      <h2>${mod.name} - 新增紀錄</h2>
      <div class="sub">${mod.desc}</div>
      <div class="grid">${fieldsHTML}</div>

        <div class="actions" style="margin:0;">

          <button class="btn-ghost" onclick="exportJSON('${mod.key}')">⬇ 匯出 JSON</button>

      </div>
      <div class="count" id="count_${mod.key}"></div>
      <div class="table-wrap"><table id="table_${mod.key}"></table></div>
    </div>
  `;
}

/* ===================== 資料存取 ===================== */
function getRecords(key){
  try{
    return JSON.parse(localStorage.getItem(STORE_PREFIX+key) || '[]');
  }catch(e){ return []; }
}
function setRecords(key, arr){
  localStorage.setItem(STORE_PREFIX+key, JSON.stringify(arr));
}

function saveRecord(key){
  const mod = MODULES.find(m=>m.key===key);
  const rec = { id: Date.now()+'_'+Math.random().toString(36).slice(2,7), createdAt: new Date().toISOString() };
  let hasValue = false;
  mod.fields.forEach(f=>{
    const el = document.getElementById(`f_${key}_${f.k}`);
    rec[f.k] = el.value;
    if(el.value) hasValue = true;
  });
  if(!hasValue){ showToast('請至少填寫一個欄位'); return; }
  const records = getRecords(key);
  records.unshift(rec);
  setRecords(key, records);
  clearForm(key);
  renderTable(key);
  showToast('已儲存「'+mod.name+'」紀錄');
}

function clearForm(key){
  const mod = MODULES.find(m=>m.key===key);
  mod.fields.forEach(f=>{
    document.getElementById(`f_${key}_${f.k}`).value = '';
  });
}

function deleteRecord(key, id){
  if(!confirm('確定刪除此筆紀錄?')) return;
  let records = getRecords(key);
  records = records.filter(r=>r.id!==id);
  setRecords(key, records);
  renderTable(key);
}

function clearAllRecords(key){
  const mod = MODULES.find(m=>m.key===key);
  if(!confirm('將清空「'+mod.name+'」所有歷史紀錄,此動作無法復原,確定?')) return;
  setRecords(key, []);
  renderTable(key);
  showToast('已清空「'+mod.name+'」紀錄');
}

/* ===================== 表格渲染 ===================== */
function renderTable(key){
  const mod = MODULES.find(m=>m.key===key);
  const records = getRecords(key);
  const table = document.getElementById('table_'+key);
  const countEl = document.getElementById('count_'+key);
  countEl.textContent = `共 ${records.length} 筆紀錄`;

  if(records.length===0){
    table.innerHTML = '<tr><td style="text-align:center;color:#999;padding:20px;">尚無資料,請於上方表單新增</td></tr>';
    return;
  }

  const headers = mod.fields.map(f=>f.l);
  let html = '<thead><tr>' + headers.map(h=>`<th>${h}</th>`).join('') + '<th>操作</th></tr></thead><tbody>';
  records.forEach(r=>{
    html += '<tr>';
    mod.fields.forEach(f=>{
      let val = r[f.k] || '';
      if(f.k==='result' && val){
        const cls = (val==='合格'||val==='允收') ? 'ok' : (val==='不合格'||val==='拒收') ? 'bad' : '';
        val = cls ? `<span class="badge ${cls}">${val}</span>` : val;
      }
      html += `<td>${val}</td>`;
    });
    html += `<td><button class="del-btn" onclick="deleteRecord('${key}','${r.id}')">刪除</button></td>`;
    html += '</tr>';
  });
  html += '</tbody>';
  table.innerHTML = html;
}

/* ===================== 匯出 / 匯入 ===================== */
function downloadBlob(content, filename, mime){
  const blob = new Blob([content], {type: mime});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function exportCSV(key){
  const mod = MODULES.find(m=>m.key===key);
  const records = getRecords(key);
  const headers = mod.fields.map(f=>f.l);
  const keys = mod.fields.map(f=>f.k);
  let csv = '\uFEFF' + headers.join(',') + '\n';
  records.forEach(r=>{
    csv += keys.map(k=>{
      let v = (r[k]||'').toString().replace(/"/g,'""');
      if(v.includes(',')||v.includes('\n')) v = `"${v}"`;
      return v;
    }).join(',') + '\n';
  });
  downloadBlob(csv, `${mod.name}_紀錄_${todayStr()}.csv`, 'text/csv;charset=utf-8');
  showToast('已匯出 CSV');
}

function exportJSON(key){
  const mod = MODULES.find(m=>m.key===key);
  const records = getRecords(key);
  downloadBlob(JSON.stringify({module:key, name:mod.name, records}, null, 2), `${mod.name}_紀錄_${todayStr()}.json`, 'application/json');
  showToast('已匯出 JSON');
}

}

function exportAllJSON(){
  const accessors = getAllModuleAccessors();
  const all = {};
  Object.keys(accessors).forEach(key=>{ all[key] = accessors[key].getData(); });
  downloadBlob(JSON.stringify(all, null, 2), `MIM品質系統_全部資料_${todayStr()}.json`, 'application/json');
  showToast('已匯出全部資料(儀器保養資料已存於雲端Google Drive,不含於此備份檔)');
}

async function importAllJSON(evt){
  const file = evt.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = async (e)=>{
    try{
      const data = JSON.parse(e.target.result);
      const accessors = getAllModuleAccessors();
      let importedCount = 0;
      const touched = [];
      for(const key of Object.keys(accessors)){
        if(!data[key]) continue;
        const acc = accessors[key];
        const current = acc.getData();
        const merged = {};
        let changedThisModule = false;
        // 針對 current 物件裡每個陣列欄位(如 rows / list / engineers)做去重合併
        Object.keys(current).forEach(field=>{
          const existingArr = Array.isArray(current[field]) ? current[field] : [];
          const incomingArr = Array.isArray(data[key][field]) ? data[key][field] : [];
          const existingKeys = new Set(existingArr.map(r=>JSON.stringify(r)));
          const newOnes = incomingArr.filter(r=>!existingKeys.has(JSON.stringify(r)));
          merged[field] = [...newOnes, ...existingArr];
          if(newOnes.length){ importedCount += newOnes.length; changedThisModule = true; }
        });
        if(changedThisModule){
          acc.setData(merged);
          touched.push(acc);
        }
      }
      if(touched.length===0){
        showToast('匯入完成,沒有新增任何紀錄(資料已存在)');
      } else {
        showToast(`匯入完成,新增 ${importedCount} 筆紀錄,正在寫回雲端…`);
        for(const acc of touched){
          try{ await acc.save(); }catch(err){ console.error(err); }
          acc.render();
        }
        showToast(`匯入完成,共新增 ${importedCount} 筆紀錄並已寫回雲端`);
      }
    }catch(err){
      showToast('匯入失敗:檔案格式錯誤');
    }
  };
  reader.readAsText(file);
  evt.target.value = '';
}

function todayStr(){
  const d = new Date();
  return d.getFullYear()+''+String(d.getMonth()+1).padStart(2,'0')+String(d.getDate()).padStart(2,'0');
}

// 將任意日期格式(含時間、ISO字串、Date物件)統一轉成「年/月/日」純日期顯示
// 搜尋比對用：去除頭尾空白、統一全形/半形，避免Excel資料裡藏的隱形字元或全形空白導致篩選比對不到
function _normSearch(s){
  return String(s==null?'':s).normalize('NFKC').replace(/\s+/g,'').toLowerCase();
}

// 把純文字裡的網址(http/https開頭)轉成可點擊的超連結，畫面上只顯示精簡文字（不印出落落長的完整網址），
// 實際跳轉還是用完整網址，只是視覺上比較乾淨
// 通用 HTML 逸出：把使用者輸入資料塞進表格/表單時一律先過這個，
// 避免資料裡剛好含有雙引號、角括號等字元時打斷HTML結構(進而讓後面的輸入框、事件綁定全部失效)
function escHtml(s){
  return String(s==null?'':s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function linkifyText(s){
  const text = String(s==null?'':s);
  const esc = text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  return esc.replace(/(https?:\/\/[^\s<]+)/g, '<a href="$1" target="_blank" rel="noopener">🔗 查看連結</a>');
}

// 通用：取得今天日期的 yyyy-MM-dd 格式(給 <input type="date"> 預設值用)
function todayISO(){
  const d = new Date();
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}

function toYMD(val){
  if(val===null || val===undefined || val==='') return '';
  if(val instanceof Date){
    if(isNaN(val.getTime())) return '';
    return val.getFullYear()+'/'+String(val.getMonth()+1).padStart(2,'0')+'/'+String(val.getDate()).padStart(2,'0');
  }
  let s = String(val).trim();
  if(!s) return '';
  // 嘗試用 Date 解析任意格式(包含 "Wed Jun 25 2025..." 等)
  const parsed = new Date(s);
  if(!isNaN(parsed.getTime())){
    return parsed.getFullYear()+'/'+String(parsed.getMonth()+1).padStart(2,'0')+'/'+String(parsed.getDate()).padStart(2,'0');
  }
  // fallback：手動處理 ISO / 斜線格式
  s = s.split('T')[0].split(' ')[0];
  s = s.replace(/\./g,'/').replace(/-/g,'/');
  const m = s.match(/^(\d{4})\/(\d{1,2})\/(\d{1,2})$/);
  if(m){
    return m[1]+'/'+m[2].padStart(2,'0')+'/'+m[3].padStart(2,'0');
  }
  return s;
}

function instSearch(val, evt){
  if(evt && evt.isComposing) return; // 輸入法組字中，先不重新渲染，避免打斷組字造成重複字
  const active = document.activeElement;
  const selStart = active && typeof active.selectionStart === 'number' ? active.selectionStart : null;
  const selEnd = active && typeof active.selectionEnd === 'number' ? active.selectionEnd : null;
  document.getElementById('instRoot').innerHTML = instRenderList(val);
  const el = document.getElementById('inst_search');
  if(el){
    el.focus();
    if(selStart !== null && el.setSelectionRange){
      el.setSelectionRange(selStart, selEnd !== null ? selEnd : selStart);
    }
  }
}

function instEnsureCache(devKey, month){
  if(!instMonthCache[devKey]) instMonthCache[devKey] = {};
  if(!instMonthCache[devKey][month]) instMonthCache[devKey][month] = {data:[], remark:''};
  return instMonthCache[devKey][month];
}

async function instLoadMonth(manual){
  const dev = INST_EQUIPMENT.find(e=>e.key===instState.deviceKey);
  const month = instState.month;
  if(manual){ instLoadingDetail = true; instRender(); }
  try{
    const res = await instApiGet({action:'getMonth', equipId: instEquipIdFor(dev), month});
    const entry = instEnsureCache(dev.key, month);
    if(res && res.success && res.data){
      entry.data = (res.data.data||[]).map(r=>({status:r.status||'', person:r.person||'', confirm:r.confirm||''}));
      entry.remark = res.data.remark || '';
      if(!instSavedMonths[dev.key]) instSavedMonths[dev.key] = new Set();
      instSavedMonths[dev.key].add(month);
      if(manual) showToast('已從雲端載入 '+month+' 月紀錄');
    } else {
      if(entry.data.length===0){
        entry.data = dev.items.map(()=>({status:'', person:instState.user.name, confirm:''}));
      }
      if(manual) showToast(month+' 月尚無雲端紀錄');
    }
  }catch(err){
    if(manual) showToast('讀取雲端失敗:'+err.message);
    const entry = instEnsureCache(dev.key, month);
    if(entry.data.length===0) entry.data = dev.items.map(()=>({status:'', person:instState.user.name, confirm:''}));
  }
  instLoadingDetail = false;
  instRender();
}

function instSetField(idx, field, value){
  const dev = INST_EQUIPMENT.find(e=>e.key===instState.deviceKey);
  const entry = instEnsureCache(dev.key, instState.month);
  if(!entry.data[idx]) entry.data[idx] = {status:'', person:instState.user.name, confirm:''};
  entry.data[idx][field] = value;
}
function instSetRemark(val){
  const dev = INST_EQUIPMENT.find(e=>e.key===instState.deviceKey);
  const entry = instEnsureCache(dev.key, instState.month);
  entry.remark = val;
}

function instClearForm(){
  if(!confirm('確定清除 '+instState.month+' 月填寫內容?(尚未儲存至雲端前清除,雲端資料不受影響)')) return;
  const dev = INST_EQUIPMENT.find(e=>e.key===instState.deviceKey);
  instMonthCache[dev.key][instState.month] = {data: dev.items.map(()=>({status:'', person:instState.user.name, confirm:''})), remark:''};
  instRender();
}

async function instSaveToCloud(){
  const dev = INST_EQUIPMENT.find(e=>e.key===instState.deviceKey);
  const month = instState.month;
  const entry = instEnsureCache(dev.key, month);
  const hasData = entry.data.some(r=>r && (r.status||r.person||r.confirm));
  if(!hasData){ showToast('請先填寫保養資料再儲存'); return; }

  const payload = {
    month, year: instState.year, machine: dev.name, assetNo: dev.propNo, owner: dev.owner,
    savedBy: instState.user.name, equipId: instEquipIdFor(dev),
    data: dev.items.map((item,i)=>({no:i+1, item, ...(entry.data[i]||{status:'',person:'',confirm:''})})),
    remark: entry.remark || ''
  };
  showToast('儲存中…');
  try{
    const res = await instApiPost('saveMonth', payload);
    if(res && res.success){
      if(!instSavedMonths[dev.key]) instSavedMonths[dev.key] = new Set();
      instSavedMonths[dev.key].add(month);
      showToast('✅ '+month+' 月已儲存至雲端 Google Drive');
      instRender();
    } else {
      showToast('❌ 儲存失敗:'+((res&&res.error)||'未知錯誤'));
    }
  }catch(err){
    showToast('❌ 連線雲端失敗:'+err.message);
  }
}

    gaugeState.list = (dataRes && dataRes.ok && Array.isArray(dataRes.data)) ? dataRes.data : [];
    gaugeState.engineers = (engRes && engRes.ok && Array.isArray(engRes.data)) ? engRes.data : [];
    gaugeState.loaded = true;
  }catch(err){
    root.innerHTML = `<div class="card"><div class="small" style="padding:20px;color:var(--bad);">讀取雲端失敗:${err.message}<br><button class="btn-ghost" style="margin-top:10px;" onclick="gaugeInit()">重試</button></div></div>`;
    return;
  }
  if(!silent) gaugeRender();
}

function gaugeSwitchView(v){
  gaugeState.view = v;
  gaugeState.editIndex = null;
  gaugeState.editEngIndex = null;
  gaugeRender();
}

function gaugeSetFilter(key, val, evt){
  gaugeState[key] = val;
  if(evt && evt.isComposing) return; // 輸入法組字中，先不重新渲染，避免打斷組字造成重複字
  const active = document.activeElement;
  const activeId = active && active.id;
  const selStart = active && typeof active.selectionStart === 'number' ? active.selectionStart : null;
  const selEnd = active && typeof active.selectionEnd === 'number' ? active.selectionEnd : null;
  gaugeRender();
  if(activeId){
    const el = document.getElementById(activeId);
    if(el){
      el.focus();
      if(selStart !== null && el.setSelectionRange){
        el.setSelectionRange(selStart, selEnd !== null ? selEnd : selStart);
      }
    }
  }
}

function gaugeReadForm(){
  return {
    partNo: document.getElementById('g_partNo').value.trim(),
    code: document.getElementById('g_code').value.trim(),
    location: document.getElementById('g_location').value.trim(),
    status: document.getElementById('g_status').value,
    handler: document.getElementById('g_handler').value.trim(),
    engineer: document.getElementById('g_engineer').value,
    supplier: document.getElementById('g_supplier').value.trim(),
    calType: document.getElementById('g_calType').value,
    calDate: document.getElementById('g_calDate').value.trim(),
    note: document.getElementById('g_note').value.trim(),
  };
}

async function gaugeSubmit(){
  const rec = gaugeReadForm();
  if(!rec.code){ showToast('請輸入檢具編號'); return; }
  if(!rec.calDate){ showToast('請輸入下次校驗日'); return; }

  if(gaugeState.editIndex!==null){
    gaugeState.list[gaugeState.editIndex] = rec;
  } else {
    gaugeState.list.push(rec);
  }
  await gaugeSaveToCloud();
  gaugeState.editIndex = null;
  gaugeRender();
}

function gaugeEdit(idx){
  gaugeState.editIndex = idx;
  gaugeRender();
  document.getElementById('gaugeRoot').scrollIntoView({behavior:'smooth'});
}
function gaugeCancelEdit(){
  gaugeState.editIndex = null;
  gaugeRender();
}

async function gaugeDelete(idx){
  if(!confirm('確定刪除這筆檢具校正紀錄?')) return;
  gaugeState.list.splice(idx,1);
  await gaugeSaveToCloud();
  gaugeRender();
}

async function gaugeSaveToCloud(){
  if(!gaugeState.list || gaugeState.list.length===0){ showToast('⚠️ 資料為空，取消儲存以防止覆寫'); return; }
  showToast('儲存中…');
  try{
    const res = await gaugeApiPost('saveData', gaugeState.list);
    if(res && res.ok){ showToast('✅ 已儲存至雲端'); }
    else{ showToast('❌ 儲存失敗:'+((res&&res.error)||'未知錯誤')); }
  }catch(err){
    showToast('❌ 連線雲端失敗:'+err.message);
  }
}

const IQC_API_URL = 'https://script.google.com/macros/s/AKfycbxCTM_oMNcMPpejo_0GBrngI5PEChYr1A0EEV5sSygT1RSLX3p9CeJzJdeOnJUS7Cq4kg/exec';

  rows: [],

  filterText: '',

  check: {app:false, jig:false, adh:false, tap:false},
  verdict: '',
  draft: {wo:'',bake:'',vendor:'',partName:'',sample:'',inspector:'',approver:'',desc:'',remark:''},
};

async function iqcApiGet(params){
  const res = await fetch(IQC_API_URL, {
    method: 'POST',
    headers: {'Content-Type': 'text/plain;charset=utf-8'},
    body: JSON.stringify({action: params.action, payload: params})
  });
  return res.json();
}
async function iqcApiPost(action, payload){
  const res = await fetch(IQC_API_URL, {
    method:'POST',
    headers:{'Content-Type':'text/plain;charset=utf-8'},
    body: JSON.stringify({action, payload})
  });
  return res.json();
}

function iqcTodayDisplay(){
  const d = new Date();
  return d.getFullYear()+'/'+String(d.getMonth()+1).padStart(2,'0')+'/'+String(d.getDate()).padStart(2,'0');

async function iqcInit(silent=false){

  try{
    const res = await iqcApiGet({action:'getData'});
    iqcState.rows = (res && res.ok && Array.isArray(res.data)) ? res.data : [];
    iqcState.loaded = true;
  }catch(err){
    root.innerHTML = `<div class="card"><div class="small" style="padding:20px;color:var(--bad);">讀取雲端失敗:${err.message}<br><button class="btn-ghost" style="margin-top:10px;" onclick="iqcInit()">重試</button></div></div>`;

}

function iqcToggleCheck(key){
  let val;
  if(iqcState.editIndex!==null){
    iqcState.rows[iqcState.editIndex][key] = !iqcState.rows[iqcState.editIndex][key];
    val = iqcState.rows[iqcState.editIndex][key];
  } else {
    iqcState.check[key] = !iqcState.check[key];
    val = iqcState.check[key];
  }
  const el = document.getElementById('iqc_chk_'+key);
  if(el) el.classList.toggle('active', !!val);
}
function iqcSetVerdict(v){
  if(iqcState.editIndex!==null){
    iqcState.rows[iqcState.editIndex].verdict = v;
  } else {
    iqcState.verdict = v;
  }
  document.querySelectorAll('.iqc-verdict-row .iqc-verdict-btn').forEach(b=>{
    b.classList.remove('sel-ok','sel-ng','sel-sp');
  });
  const btns = document.querySelectorAll('.iqc-verdict-row .iqc-verdict-btn');
  if(v==='OK' && btns[0]) btns[0].classList.add('sel-ok');
  else if(v==='NG' && btns[1]) btns[1].classList.add('sel-ng');
  else if(v==='特採' && btns[2]) btns[2].classList.add('sel-sp');
}
function iqcDraftUpdate(key, val){
  iqcState.draft[key] = val;
}

function iqcSetFilter(key, val, evt){
  iqcState[key] = val;
  if(evt && evt.isComposing) return; // 輸入法組字中，先不重新渲染，避免打斷組字造成重複字
  // ★ 修正：整份 innerHTML 重新渲染會把輸入框整個銷毀重建，導致每打一個字就失焦。
  //   這裡在重新渲染前記住目前聚焦的元素 id 與游標位置，渲染後再還原回去。
  const active = document.activeElement;
  const activeId = active && active.id;
  const selStart = active && typeof active.selectionStart === 'number' ? active.selectionStart : null;
  const selEnd = active && typeof active.selectionEnd === 'number' ? active.selectionEnd : null;
  iqcRender();
  if(activeId){
    const el = document.getElementById(activeId);
    if(el){
      el.focus();
      if(selStart !== null && el.setSelectionRange){
        el.setSelectionRange(selStart, selEnd !== null ? selEnd : selStart);
      }
    }
  }
}

function iqcReadForm(){
  return {
    wo: document.getElementById('iqc_wo').value.trim(),
    bake: document.getElementById('iqc_bake').value.trim(),
    vendor: document.getElementById('iqc_vendor').value.trim(),
    partName: document.getElementById('iqc_partName').value.trim(),
    sample: document.getElementById('iqc_sample').value.trim(),
    inspector: document.getElementById('iqc_inspector').value.trim(),
    approver: document.getElementById('iqc_approver').value.trim(),
    desc: document.getElementById('iqc_desc').value.trim(),
    remark: document.getElementById('iqc_remark').value.trim(),
  };
}

async function iqcSubmit(){
  const form = iqcReadForm();
  if(!form.wo){ showToast('請輸入工單號 / Vui lòng nhập số lệnh'); return; }

  let savedRec;
  if(iqcState.editIndex!==null){
    const rec = iqcState.rows[iqcState.editIndex];
    Object.assign(rec, form);
    if(!rec.verdict){ showToast('請選擇判定 OK 或 NG / Vui lòng chọn OK hoặc NG'); return; }
    savedRec = rec;
  } else {
    if(!iqcState.verdict){ showToast('請選擇判定 OK 或 NG / Vui lòng chọn OK hoặc NG'); return; }
    savedRec = {
      date: iqcTodayDisplay(),
      ...form,
      app: iqcState.check.app, jig: iqcState.check.jig, adh: iqcState.check.adh, tap: iqcState.check.tap,
      verdict: iqcState.verdict,
    };
    iqcState.rows.push(savedRec);
    iqcState.check = {app:false, jig:false, adh:false, tap:false};
    iqcState.verdict = '';
    iqcState.draft = {wo:'',bake:'',vendor:'',partName:'',sample:'',inspector:'',approver:'',desc:'',remark:''};
  }
  await iqcSaveToCloud();
  if(savedRec.verdict==='NG'){
    iqcNotifyNG(savedRec);
  }
  iqcState.editIndex = null;
  iqcRender();
}

async function iqcNotifyNG(record){
  try{
    await iqcApiPost('notifyNG', record);
    showToast('📨 已發送NG通知(Email+Telegram) / Đã gửi thông báo NG');
  }catch(err){
    showToast('⚠ NG通知發送失敗 / Gửi thông báo NG thất bại:'+err.message);
  }
}

function iqcEdit(i){
  iqcState.editIndex = i;
  iqcRender();
  document.getElementById('iqcRoot').scrollIntoView({behavior:'smooth'});
}
function iqcCancelEdit(){
  iqcState.editIndex = null;
  iqcRender();
}
async function iqcDelete(i){
  if(!confirm('確定刪除工單「'+(iqcState.rows[i].wo||'')+'」這筆紀錄? / Xác nhận xóa hồ sơ này?')) return;
  iqcState.rows.splice(i,1);
  await iqcSaveToCloud();
  iqcRender();
}

async function iqcSaveToCloud(){
  if(!iqcState.rows || iqcState.rows.length===0){ showToast('⚠️ 資料為空，取消儲存以防止覆寫'); return; }
  showToast('儲存中… / Đang lưu…');
  try{
    const res = await iqcApiPost('saveData', iqcState.rows);
    if(res && res.ok){ showToast('✅ 已儲存至雲端('+res.count+' 筆) / Đã lưu lên Cloud'); }
    else{ showToast('❌ 儲存失敗 / Lưu thất bại:'+((res&&res.error)||'未知錯誤')); }
  }catch(err){
    showToast('❌ 連線雲端失敗 / Kết nối Cloud thất bại:'+err.message);
  }
}

async function sinterInit(silent=false){
  const root = document.getElementById('sinterRoot');
  if(!silent) root.innerHTML = `<div class="card"><div class="small" style="padding:20px;text-align:center;">讀取雲端資料中…</div></div>`;
  try{
    const res = await sinterApiGet({action:'getData'});
    sinterState.rows = (res && res.ok && Array.isArray(res.data)) ? res.data : [];
    sinterState.loaded = true;
  }catch(err){
    root.innerHTML = `<div class="card"><div class="small" style="padding:20px;color:var(--bad);">讀取雲端失敗:${err.message}<br><button class="btn-ghost" style="margin-top:10px;" onclick="sinterInit()">重試</button></div></div>`;
    return;
  }
  if(!silent) sinterRender();
}

async function sinterImportByDate(){
  const dateEl = document.getElementById('sinter_importDate');
  const isoDate = dateEl ? dateEl.value : '';
  if(!isoDate){ showToast('請先選擇日期'); return; }
  const ymd = isoDate.split('-').join('/');
  showToast('📥 匯入中，請稍候…（掃描資料夾可能需要一些時間）');
  try{
    const res = await sinterApiPost('importByDate', {date: ymd});
    if(res && res.ok){
      showToast('✅ 匯入完成：新增 '+res.imported+' 筆，略過 '+((res.skipped&&res.skipped.length)||0)+' 筆(已存在)');
      await sinterInit();
    }else{
      showToast('❌ 匯入失敗:'+((res&&res.error)||'未知錯誤'));
    }
  }catch(err){
    showToast('❌ 連線雲端失敗:'+err.message);
  }
}

async function sinterViewDetail(i){
  const r = sinterState.rows[i];
  if(!r){ showToast('❌ 找不到這筆紀錄'); return; }
  if(!r.date || !r.furnace){ showToast('⚠️ 這筆紀錄缺少日期或爐號，無法查詢來源資料'); return; }
  showToast('🔍 查詢中…');
  try{
    const res = await sinterApiPost('getSinterDetail', {date:r.date, furnace:r.furnace});
    if(res && res.ok){
      showDataModal('燒結量測明細 - 爐號'+ (r.furnace||'') +' '+ (r.model||''), sinterBuildDetailHtml(res.rows||[]));
    }else{
      showToast('❌ 查詢失敗:'+((res&&res.error)||'未知錯誤'));
    }
  }catch(err){
    showToast('❌ 連線雲端失敗:'+err.message);
  }
}

function sinterBuildDetailHtml(rows){
  if(!rows || rows.length===0) return '<div class="small" style="color:#999;padding:8px 0;">無資料</div>';
  const first = rows[0];
  const summary = `
    <div class="small" style="margin-bottom:10px;line-height:1.8;">
      品名：${escHtml(first.product)}　工單號：${escHtml(first.workOrder)}<br>
      硬度R：${escHtml(first.hardnessR)}　硬度L：${escHtml(first.hardnessL)}<br>
      密度R：${escHtml(first.densityR)}　密度L：${escHtml(first.densityL)}<br>
      碳含量R：${escHtml(first.carbonR)}　碳含量L：${escHtml(first.carbonL)}<br>
      孔洞結果：${escHtml(first.holeResult)}　外觀結果：${escHtml(first.appearanceResult)}<br>
      檢驗員：${escHtml(first.inspector)}　審查：${escHtml(first.reviewer)}
    </div>`;
  const trs = rows.map(r=>`<tr>
      <td>${escHtml(r.item)}</td>
      <td>${escHtml(r.cavity)}</td>
      <td>${escHtml(r.side)}</td>
      <td>${escHtml(r.pieces1)}</td>
      <td>${escHtml(r.pieces2)}</td>
      <td>${escHtml(r.pieces3)}</td>
      <td>${escHtml(r.pieces4)}</td>
      <td>${escHtml(r.pieces5)}</td>
    </tr>`).join('');
  return summary + `<div class="table-wrap"><table>
    <thead><tr><th>量測項目</th><th>穴位</th><th>邊別</th><th>抽1</th><th>抽2</th><th>抽3</th><th>抽4</th><th>抽5</th></tr></thead>
    <tbody>${trs}</tbody>
  </table></div>`;
}

function sinterSetFilter(key, val, evt){
  sinterState[key] = val;
  if(evt && evt.isComposing) return; // 輸入法組字中，先不重新渲染，避免打斷組字造成重複字
  const active = document.activeElement;
  const activeId = active && active.id;
  const selStart = active && typeof active.selectionStart === 'number' ? active.selectionStart : null;
  const selEnd = active && typeof active.selectionEnd === 'number' ? active.selectionEnd : null;
  sinterRender();
  if(activeId){
    const el = document.getElementById(activeId);
    if(el){
      el.focus();
      if(selStart !== null && el.setSelectionRange){
        el.setSelectionRange(selStart, selEnd !== null ? selEnd : selStart);
      }
    }
  }
}

function sinterReadForm(){
  return {
    date: document.getElementById('sinter_date').value.trim(),
    furnace: document.getElementById('sinter_furnace').value.trim(),
    temp: document.getElementById('sinter_temp').value.trim(),
    wo: document.getElementById('sinter_wo').value.trim(),
    model: document.getElementById('sinter_model').value.trim(),
    verdict: document.getElementById('sinter_verdict').value,
    remark: document.getElementById('sinter_remark').value.trim(),
  };
}

async function sinterSubmit(){
  const form = sinterReadForm();
  if(!form.model){ showToast('請輸入模號'); return; }

  if(sinterState.editIndex!==null){
    Object.assign(sinterState.rows[sinterState.editIndex], form);
  } else {
    sinterState.rows.push(form);
  }
  await sinterSaveToCloud();
  sinterState.editIndex = null;
  sinterRender();
}

function sinterEdit(i){
  sinterState.editIndex = i;
  sinterRender();
  document.getElementById('sinterRoot').scrollIntoView({behavior:'smooth'});
}
function sinterCancelEdit(){
  sinterState.editIndex = null;
  sinterRender();
}
async function sinterDelete(i){
  if(!confirm('確定刪除這筆燒結紀錄?')) return;
  sinterState.rows.splice(i,1);
  await sinterSaveToCloud();
  sinterRender();
}

async function sinterSaveToCloud(){
  if(!sinterState.rows || sinterState.rows.length===0){ showToast('⚠️ 資料為空，取消儲存以防止覆寫'); return; }
  showToast('儲存中…');
  try{
    const res = await sinterApiPost('saveData', sinterState.rows);
    if(res && res.ok){ showToast('✅ 已儲存至雲端('+res.count+' 筆)'); }
    else{ showToast('❌ 儲存失敗:'+((res&&res.error)||'未知錯誤')); }
  }catch(err){
    showToast('❌ 連線雲端失敗:'+err.message);
  }
}

function sinterImportFile(evt){
  const file = evt.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = async (e)=>{
    try{
      const data = new Uint8Array(e.target.result);
      const wb = XLSX.read(data, {type:'array'});
      const sheet = wb.Sheets[wb.SheetNames[0]];
      const json = XLSX.utils.sheet_to_json(sheet, {defval:''});
      if(!json.length){ showToast('檔案內沒有資料'); return; }

      const colMap = {
        '日期':'date','date':'date',
        '爐號':'furnace','furnace':'furnace',
        '溫度(℃)':'temp','溫度':'temp','temp':'temp',
        '工單號':'wo','wo':'wo',
        '模號':'model','model':'model',
        '判定':'verdict','verdict':'verdict',
        '備註':'remark','remark':'remark',
      };

      let imported = 0;
      json.forEach(row=>{
        const rec = {};
        Object.keys(row).forEach(k=>{
          const mapped = colMap[k.trim()];
          if(mapped){
            let val = row[k];
            if(mapped==='date' && val instanceof Date){
              val = val.getFullYear()+'/'+String(val.getMonth()+1).padStart(2,'0')+'/'+String(val.getDate()).padStart(2,'0');
            }
            rec[mapped] = String(val).trim();
          }
        });
        if(rec.model || rec.wo){
          sinterState.rows.push(rec);
          imported++;
        }
      });

      if(imported===0){ showToast('未能辨識任何資料,請確認欄位名稱(日期/爐號/溫度/工單號/模號/判定)'); return; }

      await sinterSaveToCloud();
      sinterRender();
      showToast(`✅ 已匯入 ${imported} 筆並存到雲端`);
    }catch(err){
      showToast('❌ 匯入失敗:'+err.message);
    }
  };
  reader.readAsArrayBuffer(file);
  evt.target.value = '';
}

function dashParseDate(str){
  if(!str) return null;
  const s = String(str).trim();
  if(!s) return null;
  // 嘗試直接用 Date 解析（處理 "Wed Jul 01 2026 15:00:00 GMT+0800..." 等格式）
  const d = new Date(s);
  if(!isNaN(d.getTime())) return new Date(d.getFullYear(), d.getMonth(), d.getDate());
  // fallback：手動處理 yyyy/MM/dd 或 yyyy-MM-dd
  const clean = s.split('T')[0].split(' ')[0].replace(/-/g,'/');
  const parts = clean.split('/');
  if(parts.length===3){
    const y=parseInt(parts[0],10), m=parseInt(parts[1],10), dd=parseInt(parts[2],10);
    if(y>1900 && m>=1 && m<=12 && dd>=1 && dd<=31) return new Date(y, m-1, dd);
  }
  return null;
}

function dashGetPeriodRange(period){
  const now = new Date();
  if(period==='week'){
    const day = now.getDay();
    const diffToMonday = (day===0?6:day-1);
    const monday = new Date(now); monday.setDate(now.getDate()-diffToMonday); monday.setHours(0,0,0,0);
    const sunday = new Date(monday); sunday.setDate(monday.getDate()+6); sunday.setHours(23,59,59,999);
    return [monday, sunday];
  } else {
    const first = new Date(now.getFullYear(), now.getMonth(), 1);
    const last = new Date(now.getFullYear(), now.getMonth()+1, 0, 23,59,59,999);
    return [first, last];
  }
}

function dashComputeStats(period){
  const [start, end] = dashGetPeriodRange(period);
  return DASH_MODULES.map(mod=>{
    let rows = [];
    try{ rows = mod.source() || []; }catch(e){ rows = []; }
    const inPeriod = rows.filter(r=>{
      const d = dashParseDate(r[mod.dateField]);
      return d && d>=start && d<=end;
    });
    const total = inPeriod.length;
    const fail  = inPeriod.filter(r=> r[mod.resultField]==='NG' || r[mod.resultField]==='不合格' || r[mod.resultField]==='拒收').length;
    const sp    = inPeriod.filter(r=> r[mod.resultField]==='特採').length;
    const pass  = total - fail - sp;
    const rate  = total ? Math.round(pass/total*100) : null;
    return { ...mod, total, pass, fail, sp, rate };
  });
}

function dashRenderVendorReturn(period){
  const [from, to] = dashGetPeriodRange(period);
  const periodLabel = period==='week' ? '本週' : '本月';
  const rows = (iqcState.rows||[]).filter(r=>{
    const d = dashParseDate(r.date);
    return d && d >= from && d <= to;
  });

  if(rows.length===0) return `
    <div class="dash-section-title">🏭 ${periodLabel} IQC 廠商退料狀況</div>
    <div class="small" style="color:#999;padding:8px 0;">本期間無進料檢驗資料</div>`;

  const vendorMap = {};
  rows.forEach(r=>{
    const v = r.vendor || '未填廠商';
    if(!vendorMap[v]) vendorMap[v] = {total:0, ok:0, ng:0, sp:0};
    vendorMap[v].total++;
    if(r.verdict==='NG' || r.verdict==='ng') vendorMap[v].ng++;
    else if(r.verdict==='特採') vendorMap[v].sp++;
    else vendorMap[v].ok++;
  });

  const vendorRows = Object.entries(vendorMap)
    .sort((a,b)=>(b[1].ng+b[1].sp) - (a[1].ng+a[1].sp))
    .map(([vendor, stat])=>{
      const rate = stat.total>0 ? Math.round(stat.ok/stat.total*100) : 0;
      const barColor = rate>=95 ? 'var(--ok)' : rate>=80 ? 'var(--warn)' : 'var(--bad)';
      const ngBadge = stat.ng>0
        ? `<span style="background:var(--bad);color:#fff;border-radius:12px;padding:1px 8px;font-size:12px;">${stat.ng} 筆退料</span>`
        : `<span style="color:#aaa;">0</span>`;
      const spBadge = stat.sp>0
        ? `<span style="background:#fff3cd;color:#856404;border:1px solid #f0d070;border-radius:12px;padding:1px 8px;font-size:12px;">${stat.sp} 筆特採</span>`
        : `<span style="color:#aaa;">0</span>`;
      return `<tr>
        <td><b>${vendor}</b></td>
        <td>${stat.total}</td>
        <td style="color:var(--ok);">${stat.ok}</td>
        <td>${ngBadge}</td>
        <td>${spBadge}</td>
        <td><span class="dash-rate-bar"><span class="dash-rate-fill" style="width:${rate}%;background:${barColor};"></span></span>${rate}%</td>
      </tr>`;
    }).join('');

  const ngDetails = rows.filter(r=>r.verdict==='NG'||r.verdict==='ng');
  const spDetails = rows.filter(r=>r.verdict==='特採');

  const ngDetailRows = ngDetails.length===0
    ? '<tr><td colspan="6" style="text-align:center;color:#999;">本期間無退料紀錄</td></tr>'
    : ngDetails.map(r=>`<tr>
        <td>${toYMD(r.date)}</td>
        <td>${escHtml(r.vendor||'—')}</td>
        <td>${escHtml(r.wo||'—')}</td>
        <td>${escHtml(r.partName||'—')}</td>
        <td>${escHtml(r.sample||'—')}</td>
        <td style="text-align:left;color:var(--bad);">${r.desc||'—'}</td>
      </tr>`).join('');

  const spDetailRows = spDetails.length===0
    ? '<tr><td colspan="6" style="text-align:center;color:#999;">本期間無特採紀錄</td></tr>'
    : spDetails.map(r=>`<tr>
        <td>${toYMD(r.date)}</td>
        <td>${escHtml(r.vendor||'—')}</td>
        <td>${escHtml(r.wo||'—')}</td>
        <td>${escHtml(r.partName||'—')}</td>
        <td>${escHtml(r.sample||'—')}</td>
        <td style="text-align:left;color:#856404;">${r.desc||'—'}</td>
      </tr>`).join('');

  return `
    <div class="dash-section-title">🏭 ${periodLabel} IQC 廠商進料狀況</div>
    <div class="table-wrap">
      <table class="dash-module-table">
        <thead><tr><th>廠商</th><th>送貨批數</th><th>合格</th><th>退料(NG)</th><th>特採</th><th>合格率</th></tr></thead>
        <tbody>${vendorRows}</tbody>
      </table>
    </div>
    <div class="dash-section-title" style="margin-top:16px;">🔴 ${periodLabel}退料明細(NG)</div>
    <div class="table-wrap">
      <table class="dash-module-table">
        <thead><tr><th>日期</th><th>廠商</th><th>工單號</th><th>品名</th><th>抽樣/批量</th><th>異常描述</th></tr></thead>
        <tbody>${ngDetailRows}</tbody>
      </table>
    </div>
    <div class="dash-section-title" style="margin-top:16px;">🟡 ${periodLabel}特採明細</div>
    <div class="table-wrap">
      <table class="dash-module-table">
        <thead><tr><th>日期</th><th>廠商</th><th>工單號</th><th>品名</th><th>抽樣/批量</th><th>異常描述</th></tr></thead>
        <tbody>${spDetailRows}</tbody>
      </table>
    </div>`;
}

const INJ_API_URL = 'https://script.google.com/macros/s/AKfycby91gZgMX8rlLOhXPqb3pVDayUOt-r2IKkNrhfhTZVhQFAndoA7CuheBU-RgTNjUI7W/exec';

const INJ_VERDICT_OPTIONS = ['合格','不合格','待人工確認'];
const INJ_APPEARANCE_OPTIONS = ['OK','NG',''];

let injState = {
  rows: [],
  loaded: false,
  editIndex: null,
  filterText: '',
  filterVerdict: 'all',
};

async function injApiGet(params){
  const res = await fetch(INJ_API_URL, {
    method: 'POST',
    headers: {'Content-Type': 'text/plain;charset=utf-8'},
    body: JSON.stringify({action: params.action, payload: params})
  });
  return res.json();
}
async function injApiPost(action, payload){
  const res = await fetch(INJ_API_URL, {
    method:'POST',
    headers:{'Content-Type':'text/plain;charset=utf-8'},
    body: JSON.stringify({action, payload})
  });
  return res.json();
}

function injTodayDisplay(){
  const d = new Date();
  return d.getFullYear()+'/'+String(d.getMonth()+1).padStart(2,'0')+'/'+String(d.getDate()).padStart(2,'0');
}

async function injInit(silent=false){
  const root = document.getElementById('injRoot');
  if(!silent) root.innerHTML = `<div class="card"><div class="small" style="padding:20px;text-align:center;">讀取雲端資料中…</div></div>`;
  try{
    const res = await injApiGet({action:'getData'});
    injState.rows = (res && res.ok && Array.isArray(res.data)) ? res.data : [];
    injState.loaded = true;
  }catch(err){
    root.innerHTML = `<div class="card"><div class="small" style="padding:20px;color:var(--bad);">讀取雲端失敗:${err.message}<br><button class="btn-ghost" style="margin-top:10px;" onclick="injInit()">重試</button></div></div>`;
    return;
  }
  if(!silent) injRender();
}

function injSetFilter(key, val, evt){
  injState[key] = val;
  if(evt && evt.isComposing) return; // 輸入法組字中，先不重新渲染，避免打斷組字造成重複字
  const active = document.activeElement;
  const activeId = active && active.id;
  const selStart = active && typeof active.selectionStart === 'number' ? active.selectionStart : null;

  }
}

// 一次性遷移:把舊資料「批號/工單」混合欄位拆成獨立的 lot 與 wo
async function fqcMigrateLotWo(){
  const sepRe = /[\/\\、,，\s]+/; // 支援 / \ 、 , ， 空白 當分隔符
  let changed = 0;
  fqcState.rows.forEach(r=>{
    if(r.wo){ return; } // 已經有工單欄位的不動
    const raw = (r.lot||'').trim();
    if(!raw) return;
    const parts = raw.split(sepRe).filter(Boolean);
    if(parts.length>=2){
      r.lot = parts[0];
      r.wo = parts.slice(1).join(' ');
      changed++;
    }
  });
  if(changed===0){
    showToast('沒有需要拆分的舊資料');
    return;
  }
  if(!confirm(`偵測到 ${changed} 筆舊資料可拆分批號/工單,確定要寫回雲端嗎?`)) return;
  await fqcSaveToCloud();
  fqcRender();
}

        <div><label>檢驗員</label><input id="blast_inspector" value="${escHtml(rec.inspector||'')}" placeholder="檢驗員"></div>
        <div class="full"><label>備註</label><textarea id="blast_note" placeholder="如: W29">${escHtml(rec.note||'')}</textarea></div>
      </div>
      <div class="actions">
        <button class="btn-primary" onclick="blastSubmit()">${editing?'💾 儲存修改':'➕ 新增至清單'}</button>
        ${editing?'<button class="btn-ghost" onclick="blastCancelEdit()">取消編輯</button>':''}
      </div>
    </div>`;

  const filtered = blastState.rows.filter(r=>{
    if(blastState.filterResult!=='all' && r.result!==blastState.filterResult) return false;
    if(blastState.filterText){
      const f = _normSearch(blastState.filterText);
      const hay = _normSearch([r.wo,r.partNo,r.partName,r.note].join(' '));
      if(!hay.includes(f)) return false;
    }
    return true;
  });

  const rows = filtered.map(r=>{
    const i = blastState.rows.indexOf(r);
    return `
      <tr class="${r.result==='NG'?'ng-row':''}">
        <td>${toYMD(r.date)}</td>
        <td>${escHtml(r.partName||'')}</td>

        <td>${escHtml(r.note||'')}</td>

    ${formHTML}

        <h2 style="margin:0;">噴砂清洗明細清單</h2>

      <div class="gauge-filter-row">
        <input id="blast_filterText" placeholder="🔍 搜尋工單號／料號／品名／備註..." value="${blastState.filterText}" oninput="blastSetFilter('filterText',this.value,event)" oncompositionend="blastSetFilter('filterText',this.value)">
        <select onchange="blastSetFilter('filterResult',this.value)">
          <option value="all" ${blastState.filterResult==='all'?'selected':''}>全部</option>
          <option value="OK" ${blastState.filterResult==='OK'?'selected':''}>僅看OK</option>
          <option value="NG" ${blastState.filterResult==='NG'?'selected':''}>僅看NG</option>
        </select>
      </div>
      <div class="gauge-summary">顯示 ${filtered.length} / ${blastState.rows.length} 筆</div>
      <div class="table-wrap">
        <table>
          <thead><tr><th>日期</th><th>品名</th><th>工單號碼</th><th>料號</th><th>設備/方式</th><th>數量</th><th>抽樣數</th><th>判定</th><th>檢驗員</th><th>備註</th><th>操作</th></tr></thead>
          <tbody>${rows || '<tr><td colspan="11" style="text-align:center;color:#999;padding:16px;">尚無資料</td></tr>'}</tbody>
        </table>
      </div>

}

function blastSetFilter(key, val, evt){
  blastState[key] = val;
  if(evt && evt.isComposing) return; // 輸入法組字中，先不重新渲染，避免打斷組字造成重複字
  const active = document.activeElement;
  const activeId = active && active.id;
  const selStart = active && typeof active.selectionStart === 'number' ? active.selectionStart : null;
  const selEnd = active && typeof active.selectionEnd === 'number' ? active.selectionEnd : null;
  blastRender();
  if(activeId){
    const el = document.getElementById(activeId);
    if(el){
      el.focus();
      if(selStart !== null && el.setSelectionRange){
        el.setSelectionRange(selStart, selEnd !== null ? selEnd : selStart);
      }
    }
  }
}

function blastReadForm(){
  return {
    date: (document.getElementById('blast_date').value||'').replace(/-/g,'/'),
    partName: document.getElementById('blast_partName').value.trim(),
    wo: document.getElementById('blast_wo').value.trim(),
    partNo: document.getElementById('blast_partNo').value.trim(),
    method: document.getElementById('blast_method').value,
    qty: document.getElementById('blast_qty').value.trim(),
    sample: document.getElementById('blast_sample').value.trim(),
    result: document.getElementById('blast_result').value,
    inspector: document.getElementById('blast_inspector').value.trim(),
    note: document.getElementById('blast_note').value.trim(),
  };
}

async function blastSubmit(){
  const form = blastReadForm();
  if(!form.wo && !form.partName){ showToast('請至少輸入工單號碼或品名'); return; }

  let savedRec;
  if(blastState.editIndex!==null){
    savedRec = blastState.rows[blastState.editIndex];
    Object.assign(savedRec, form);
  } else {
    savedRec = form;
    blastState.rows.push(savedRec);
  }
  await blastSaveToCloud();
  if(savedRec.result==='NG'){
    blastNotifyNG(savedRec);
  }
  blastState.editIndex = null;
  blastRender();
}

async function blastNotifyNG(record){
  try{
    await blastApiPost('notifyNG', record);
    showToast('📨 已發送NG通知(Email+Telegram)');
  }catch(err){
    showToast('⚠ NG通知發送失敗:'+err.message);
  }
}

function blastEdit(i){
  blastState.editIndex = i;
  blastRender();
  document.getElementById('blastRoot').scrollIntoView({behavior:'smooth'});
}
function blastCancelEdit(){
  blastState.editIndex = null;
  blastRender();
}
async function blastDelete(i){
  if(!confirm('確定刪除這筆噴砂清洗紀錄?')) return;
  blastState.rows.splice(i,1);
  await blastSaveToCloud();
  blastRender();
}

async function blastSaveToCloud(){
  if(!blastState.rows || blastState.rows.length===0){ showToast('⚠️ 資料為空，取消儲存以防止覆寫'); return; }
  showToast('儲存中…');
  try{
    const res = await blastApiPost('saveData', blastState.rows);
    if(res && res.ok){ showToast('✅ 已儲存至雲端('+res.count+' 筆)'); }
    else{ showToast('❌ 儲存失敗:'+((res&&res.error)||'未知錯誤')); }
  }catch(err){
    showToast('❌ 連線雲端失敗:'+err.message);
  }
}

blastInit();

/* ===================== 自製整形邏輯,串接雲端 Apps Script ===================== */
const RESHAPE_API_URL = 'https://script.google.com/macros/s/AKfycbzNQDkPfFtFM-M8z6PjBsJuqNTmlQDhrPJG45MGliGFUbgYhLKrgm36IEsfH1NqjocKcQ/exec';

const RESHAPE_RESULT_OPTIONS = ['OK','NG'];

let reshapeState = {
  rows: [],
  loaded: false,
  editIndex: null,
  filterText: '',
  filterResult: 'all',
};

async function reshapeApiGet(params){
  const res = await fetch(RESHAPE_API_URL, {
    method: 'POST',
    headers: {'Content-Type': 'text/plain;charset=utf-8'},
    body: JSON.stringify({action: params.action, payload: params})
  });
  return res.json();
}
async function reshapeApiPost(action, payload){
  const res = await fetch(RESHAPE_API_URL, {
    method:'POST',
    headers:{'Content-Type':'text/plain;charset=utf-8'},
    body: JSON.stringify({action, payload})
  });
  return res.json();
}

function reshapeTodayISO(){
  const d = new Date();
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
function reshapeToInputDate(val){
  if(!val) return reshapeTodayISO();
  const s = String(val).trim().replace(/\//g,'-');
  const parts = s.split('-');
  if(parts.length===3){
    const y = parts[0].padStart(4,'0'), m = parts[1].padStart(2,'0'), d = parts[2].padStart(2,'0');
    return `${y}-${m}-${d}`;
  }
  return reshapeTodayISO();
}

async function reshapeInit(silent=false){
  const root = document.getElementById('reshapeRoot');
  if(!silent) root.innerHTML = `<div class="card"><div class="small" style="padding:20px;text-align:center;">讀取雲端資料中…</div></div>`;
  try{
    const res = await reshapeApiGet({action:'getData'});
    reshapeState.rows = (res && res.ok && Array.isArray(res.data)) ? res.data : [];
    reshapeState.loaded = true;
  }catch(err){
    root.innerHTML = `<div class="card"><div class="small" style="padding:20px;color:var(--bad);">讀取雲端失敗:${err.message}<br><button class="btn-ghost" style="margin-top:10px;" onclick="reshapeInit()">重試</button></div></div>`;

}

        <select onchange="reshapeSetFilter('filterResult',this.value)">
          <option value="all" ${reshapeState.filterResult==='all'?'selected':''}>全部</option>

        </select>
      </div>
